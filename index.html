<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Moon Compass</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/00ffcc/ffffff?text=Moon">
  <style>
    :root { --bg-color: #0c0f12; --accent-color: #00ffcc; --lamp-off: #22262b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background-color: var(--bg-color); color: #ffffff;
      font-family: -apple-system, sans-serif; margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .container { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 70vh; width: 100%; max-width: 400px; padding: 20px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; margin: 0; color: #f0f6fc; }
    .lamp {
      width: 140px; height: 140px; border-radius: 50%; background-color: var(--lamp-off);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 2px 4px rgba(0,0,0,0.4);
      transition: background-color 0.05s, box-shadow 0.05s;
    }
    .lamp.active { background-color: var(--accent-color); box-shadow: 0 0 40px var(--accent-color), inset 0 0 15px #ffffff; }
    .btn {
      background-color: #1f6feb; color: #ffffff; border: none; padding: 16px 32px;
      border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 15px rgba(31, 111, 235, 0.4);
    }
    .status-text { font-size: 14px; color: #8b949e; text-align: center; min-height: 50px; line-height: 1.6; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MOON COMPASS PWA</h1>
    <div class="lamp" id="targetLamp"></div>
    <div id="actionArea"><button class="btn" id="permissionBtn">センサーを開始する</button></div>
    <div class="status-text" id="statusDisplay">「ホーム画面に追加」して起動すると動作します。</div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW Registered')).catch(err => console.error(err));
    }
    const permissionBtn = document.getElementById('permissionBtn');
    const targetLamp = document.getElementById('targetLamp');
    const statusDisplay = document.getElementById('statusDisplay');
    let lastHeading = 0; let flashTimeout = null;

    function onOrientationChange(event) {
      if (event.webkitCompassHeading !== undefined) {
        const heading = event.webkitCompassHeading;
        if (Math.abs(heading - lastHeading) > 0.1) {
          targetLamp.classList.add('active');
          clearTimeout(flashTimeout);
          flashTimeout = setTimeout(() => { targetLamp.classList.remove('active'); }, 80);
          statusDisplay.innerText = "【センサー反応中】\n方位角: " + heading.toFixed(2) + "°";
        }
        lastHeading = heading;
      }
    }

    permissionBtn.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(responseState => {
            if (responseState === 'granted') {
              window.addEventListener('deviceorientation', onOrientationChange, false);
              permissionBtn.style.display = 'none';
              statusDisplay.innerText = "センサー作動中。\niPhoneを左右に動かしてください。";
            } else {
              statusDisplay.innerText = "アクセスが拒否されました。";
            }
          }).catch(error => { statusDisplay.innerText = "エラー: " + error; });
      } else {
        window.addEventListener('deviceorientation', onOrientationChange, false);
        permissionBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
